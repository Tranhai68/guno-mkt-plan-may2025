function formatVND(n) {
  const value = Number(n) || 0;
  if (value >= 1e12) return (value / 1e12).toFixed(1).replace('.0', '') + ' nghìn tỷ';
  if (value >= 1e9) return (value / 1e9).toFixed(1).replace('.0', '') + ' tỷ';
  if (value >= 1e6) return (value / 1e6).toFixed(0) + 'M';
  if (value >= 1e3) return (value / 1e3).toFixed(0) + 'K';
  return value.toLocaleString('vi-VN');
}

function formatVNDFull(n) {
  return (Number(n) || 0).toLocaleString('vi-VN') + 'đ';
}

function formatNum(n) {
  return (Number(n) || 0).toLocaleString('vi-VN');
}

function pct(part, total) {
  const p = Number(part) || 0;
  const t = Number(total) || 1;
  return Math.round((p / t) * 100);
}

  let sum = 0;
  Object.values(tracker).forEach(day => {
    if (day[id]) sum += parseFloat(day[id]) || 0;
  });
  return sum;
}

function getFilledDays() {

  return Object.keys(tracker).filter(day => Object.keys(tracker[day] || {}).length > 0).sort();
}

function getDaysInRange(start, end) {
  const days = [];
  const current = new Date(start);
  const last = new Date(end);
  while (current <= last) {
    days.push(current.toISOString().split('T')[0]);
    current.setDate(current.getDate() + 1);
  }
  return days;
}
