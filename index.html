<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUNO — Kế Hoạch Truyền Thông MKT Tháng 5/2026</title>
    <meta name="description" content="GUNO Marketing Plan T5/2026 — 50 tỷ VND | Yêu ai, tặng GU | MegaLive Ngọc Trinh & Phạm Thoại">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="data.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --bg2: #f8f8f8;
            --bg3: #f0f0f0;
            --bg4: #e8e8e8;
            --border: rgba(0,0,0,0.08);
            --border-h: rgba(0,0,0,0.15);
            --txt: #1a1a1a;
            --txt2: #555555;
            --txt3: #888888;
            --rose: #333333;
            --rose-light: #666666;
            --gold: #333333;
            --violet: #555555;
            --crimson: #cc3333;
            --emerald: #228B22;
            --blue: #2a6cb6;
            --cyan: #1a8a8a;
            --pink: #cc3366;
            --orange: #cc6600;
            --tiktok: #333333;
            --shopee: #cc4400;
            --facebook: #3b6ea5;
            --grad-hero: linear-gradient(160deg, #f5f5f5 0%, #eee 40%, #f0f0f0 100%);
            --grad-gold: linear-gradient(135deg, #333, #555);
            --grad-cool: linear-gradient(135deg, #555, #777);
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body {
            font-family:'Inter',-apple-system,sans-serif;
            background:var(--bg); color:var(--txt);
            line-height:1.65; overflow-x:hidden;
        }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:var(--bg); }
        ::-webkit-scrollbar-thumb { background:#bbb; border-radius:3px; }

        /* ── NAV ── */
        .nav {
            position:fixed; top:0; left:0; right:0; z-index:1000;
            background:rgba(255,255,255,0.92); backdrop-filter:blur(24px);
            border-bottom:1px solid var(--border);
        }
        .nav-inner {
            max-width:1360px; margin:0 auto;
            display:flex; align-items:center; justify-content:space-between;
            padding:0 36px; height:60px;
        }
        .nav-brand {
            font-family:'Space Grotesk'; font-weight:700; font-size:17px;
            letter-spacing:2px;
        }
        .nav-brand span { color:var(--rose); }
        .nav-links { display:flex; gap:2px; }
        .nav-link {
            padding:7px 14px; border-radius:8px;
            font-size:12px; font-weight:500; letter-spacing:0.3px;
            color:var(--txt3); cursor:pointer;
            transition:all 0.25s; border:none; background:none;
        }
        .nav-link:hover { color:var(--txt2); }
        .nav-link.active { color:#1a1a1a; background:rgba(0,0,0,0.06); font-weight:700; }
        .nav-admin {
            font-size:11px; padding:6px 14px; border-radius:8px;
            background:rgba(0,0,0,0.04); color:#333;
            border:1px solid rgba(0,0,0,0.1);
            text-decoration:none; font-weight:600;
            transition:all 0.2s;
        }
        .nav-admin:hover { background:rgba(0,0,0,0.08); }

        /* ── LAYOUT ── */
        .main { max-width:1360px; margin:0 auto; padding:76px 36px 60px; }
        .section { display:none; animation:fadeSlide 0.5s ease; }
        .section.active { display:block; }
        @keyframes fadeSlide { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        @keyframes shimmer { to{background-position:200% center} }

        /* ── HERO ── */
        .hero {
            background:var(--grad-hero);
            border-radius:24px; padding:72px 64px;
            position:relative; overflow:hidden;
            margin-bottom:48px; border:1px solid var(--border);
        }
        .hero::before {
            content:''; position:absolute; top:-30%; right:-15%;
            width:500px; height:500px;
            background:radial-gradient(circle, rgba(0,0,0,0.02), transparent 70%);
            border-radius:50%; animation:float 8s ease-in-out infinite;
        }
        .hero::after {
            content:''; position:absolute; bottom:-40%; left:10%;
            width:400px; height:400px;
            background:radial-gradient(circle, rgba(0,0,0,0.01), transparent 70%);
            border-radius:50%;
        }
        .hero-eyebrow {
            display:inline-flex; align-items:center; gap:8px;
            font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:3px;
            color:var(--rose); margin-bottom:24px;
        }
        .hero-eyebrow::before {
            content:''; width:24px; height:1px; background:var(--rose);
        }
        .hero h1 {
            font-family:'Space Grotesk',sans-serif;
            font-size:clamp(36px,5.5vw,60px); font-weight:800;
            line-height:1.08; margin-bottom:20px; position:relative; z-index:1; letter-spacing:-1px;
        }
        .hero h1 .accent {
            font-family:'Space Grotesk',sans-serif;
            background:var(--grad-gold);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .hero-sub {
            font-size:16px; color:var(--txt2); max-width:560px;
            margin-bottom:40px; position:relative; z-index:1;
        }
        .hero-metrics {
            display:flex; gap:16px; flex-wrap:wrap; position:relative; z-index:1;
        }
        .hero-metric {
            background:rgba(0,0,0,0.02); border:1px solid var(--border);
            padding:20px 28px; border-radius:14px;
            backdrop-filter:blur(10px);
            min-width:140px;
        }
        .hero-metric-val {
            font-family:'Space Grotesk'; font-size:28px; font-weight:800;
        }
        .hero-metric-label { font-size:11px; color:var(--txt3); margin-top:4px; letter-spacing:0.5px; }

        /* ── SECTION HEADER ── */
        .sec-head { margin-bottom:36px; }
        .sec-head-line { width:32px; height:2px; background:var(--grad-gold); margin-bottom:14px; border-radius:1px; }
        .sec-head h2 { font-family:'Space Grotesk'; font-size:24px; font-weight:700; margin-bottom:6px; letter-spacing:-0.3px; }
        .sec-head p { font-size:14px; color:var(--txt3); }

        /* ── GRIDS ── */
        .g2 { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; margin-bottom:28px; }
        .g3 { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:28px; }
        .g4 { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }

        /* ── CARDS ── */
        .card {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius); padding:28px;
            transition:all 0.3s;
        }
        .card:hover { border-color:var(--border-h); }
        .card-sm { padding:20px; }

        /* ── CHANNEL CARDS ── */
        .ch-card { position:relative; overflow:hidden; }
        .ch-card::after {
            content:''; position:absolute; top:0; left:0; right:0; height:2px;
        }
        .ch-val { font-family:'Space Grotesk'; font-size:36px; font-weight:800; margin:12px 0 4px; }
        .ch-sub { font-size:12px; color:var(--txt3); }
        .ch-bar { height:4px; border-radius:2px; background:rgba(0,0,0,0.06); margin-top:16px; overflow:hidden; }
        .ch-bar-fill { height:100%; border-radius:2px; transition:width 1.5s ease; }

        /* ── TABS ── */
        .tabs {
            display:inline-flex; gap:2px; background:var(--bg2); padding:3px;
            border-radius:10px; border:1px solid var(--border); margin-bottom:28px;
        }
        .tab {
            padding:8px 20px; border-radius:8px; font-size:12px; font-weight:600;
            cursor:pointer; color:var(--txt3); transition:all 0.2s;
            border:none; background:none;
        }
        .tab.active { background:#333; color:#fff; }
        .tab:hover:not(.active) { color:var(--txt2); }
        .tab-c { display:none; animation:fadeSlide 0.3s; }
        .tab-c.active { display:block; }

        /* ── TABLE ── */
        .tbl-wrap {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius); overflow:hidden; margin-bottom:28px;
        }
        .tbl-title {
            padding:18px 24px; font-weight:700; font-size:14px;
            border-bottom:1px solid var(--border);
            display:flex; align-items:center; gap:8px;
            letter-spacing:-0.2px;
        }
        table { width:100%; border-collapse:collapse; font-size:12.5px; }
        th {
            text-align:left; padding:10px 16px;
            background:rgba(0,0,0,0.02);
            font-weight:600; font-size:10px; text-transform:uppercase; letter-spacing:0.8px;
            color:var(--txt3); border-bottom:1px solid var(--border);
        }
        td { padding:11px 16px; border-bottom:1px solid var(--border); color:var(--txt2); }
        tr:last-child td { border:none; }
        tr:hover td { background:rgba(0,0,0,0.02); }
        .num { font-family:'Space Grotesk'; font-weight:600; color:var(--txt); }
        .hi { color:var(--emerald); font-weight:600; }

        /* ── TIMELINE ── */
        .tl { position:relative; margin:40px 0; }
        .tl::before {
            content:''; position:absolute; left:20px; top:0; bottom:0; width:1px;
            background:linear-gradient(to bottom, var(--rose), var(--violet), var(--emerald));
        }
        .tl-item { position:relative; padding-left:56px; margin-bottom:36px; }
        .tl-dot {
            position:absolute; left:13px; top:4px; width:16px; height:16px;
            border-radius:50%; border:2px solid #333; background:#fff;
        }
        .tl-item.at .tl-dot { background:#333; box-shadow:0 0 8px rgba(0,0,0,0.15); }
        .tl-date { font-size:10px; color:var(--rose); font-weight:700; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:6px; }
        .tl-title { font-size:17px; font-weight:700; margin-bottom:6px; font-family:'Space Grotesk'; }
        .tl-desc { color:var(--txt2); font-size:13px; margin-bottom:12px; }
        .tl-tags { display:flex; gap:8px; flex-wrap:wrap; }
        .tag {
            display:inline-flex; align-items:center; gap:4px;
            padding:5px 12px; border-radius:6px; font-size:11px; font-weight:600;
            background:rgba(0,0,0,0.03); border:1px solid var(--border);
        }
        .tag strong { font-family:'Space Grotesk'; }

        /* ── PROGRAMS ── */
        .prog {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius); overflow:hidden;
            margin-bottom:16px; transition:all 0.3s; cursor:pointer;
        }
        .prog:hover { border-color:var(--border-h); }
        .prog-head {
            padding:20px 24px; display:flex; align-items:center; gap:16px;
        }
        .prog-num {
            width:36px; height:36px; border-radius:10px;
            display:flex; align-items:center; justify-content:center;
            font-family:'Space Grotesk'; font-weight:800; font-size:14px;
            background:#333; color:#fff; flex-shrink:0;
        }
        .prog-info { flex:1; }
        .prog-info h3 { font-size:14px; font-weight:700; }
        .prog-info span { font-size:11px; color:var(--txt3); }
        .prog-rev { text-align:right; }
        .prog-rev-val { font-family:'Space Grotesk'; font-weight:800; font-size:18px; color:var(--emerald); }
        .prog-rev-sub { font-size:10px; color:var(--txt3); }
        .prog-body { display:none; padding:0 24px 24px; border-top:1px solid var(--border); }
        .prog.open .prog-body { display:block; animation:fadeSlide 0.3s; }
        .prog-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:16px; }
        .prog-stat { background:var(--bg3); padding:14px; border-radius:10px; text-align:center; }
        .prog-stat-val { font-family:'Space Grotesk'; font-weight:700; font-size:18px; }
        .prog-stat-label { font-size:10px; color:var(--txt3); margin-top:2px; }

        /* ── DEPARTMENTS ── */
        .dept {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius); margin-bottom:12px;
            overflow:hidden; transition:all 0.3s;
        }
        .dept:hover { border-color:var(--border-h); }
        .dept-head {
            padding:20px 24px; cursor:pointer;
            display:flex; align-items:center; justify-content:space-between;
        }
        .dept-left { display:flex; align-items:center; gap:14px; }
        .dept-icon { font-size:24px; }
        .dept-name { font-size:15px; font-weight:700; }
        .dept-sub { font-size:12px; color:var(--txt3); }
        .dept-cost { font-family:'Space Grotesk'; font-weight:700; font-size:16px; color:var(--rose); }
        .dept-cost-sub { font-size:10px; color:var(--txt3); font-weight:400; }
        .dept-toggle { font-size:14px; color:var(--txt3); transition:transform 0.3s; }
        .dept.open .dept-toggle { transform:rotate(180deg); }
        .dept-body { display:none; padding:0 24px 24px; border-top:1px solid var(--border); }
        .dept.open .dept-body { display:block; animation:fadeSlide 0.3s; }

        /* ── P&L ── */
        .pl-row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(0,0,0,0.05); align-items:center; }
        .pl-row:last-child { border:none; }
        .pl-row.hdr { font-weight:700; font-size:14px; padding:14px 0; color:var(--txt); }
        .pl-row.sub { padding-left:20px; font-size:13px; }
        .pl-row.total { border-top:2px solid var(--border); padding-top:14px; font-weight:700; }
        .pl-label { color:var(--txt2); font-size:13px; }
        .pl-val { font-family:'Space Grotesk'; font-weight:600; font-size:13px; }
        .pl-neg { color:var(--crimson); }
        .pl-pos { color:var(--emerald); }

        /* ── KPI CARDS ── */
        .kpi-card {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius-sm); padding:20px; text-align:center;
            transition:all 0.3s;
        }
        .kpi-card:hover { border-color:var(--border-h); }
        .kpi-val { font-family:'Space Grotesk'; font-size:22px; font-weight:800; }
        .kpi-label { font-size:11px; color:var(--txt3); margin-top:4px; }
        .kpi-target { font-size:10px; color:var(--rose); margin-top:6px; font-weight:500; }

        /* ── PROGRESS ── */
        .prog-bar-group { margin-bottom:14px; }
        .prog-bar-head { display:flex; justify-content:space-between; margin-bottom:5px; font-size:12px; }
        .prog-bar { height:6px; background:rgba(0,0,0,0.06); border-radius:3px; overflow:hidden; }
        .prog-bar-fill { height:100%; border-radius:3px; transition:width 1.5s ease; }

        /* ── ALERTS ── */
        .alert {
            padding:18px 22px; border-radius:var(--radius-sm);
            margin-bottom:20px; border-left:3px solid; font-size:13px;
        }
        .alert-rose { background:rgba(0,0,0,0.02); border-color:#333; }
        .alert-red { background:rgba(204,51,51,0.04); border-color:var(--crimson); }
        .alert-green { background:rgba(34,139,34,0.04); border-color:var(--emerald); }
        .alert-blue { background:rgba(42,108,182,0.04); border-color:var(--blue); }
        .alert-title { font-weight:700; margin-bottom:4px; font-size:13px; }

        /* ── DONUT ── */
        .donut-wrap { display:flex; align-items:center; gap:36px; flex-wrap:wrap; }
        .donut-svg { width:180px; height:180px; }
        .donut-legend { display:flex; flex-direction:column; gap:10px; }
        .donut-item { display:flex; align-items:center; gap:8px; font-size:12px; }
        .donut-dot { width:10px; height:10px; border-radius:3px; }

        /* ── FOOTER ── */
        .footer {
            text-align:center; padding:48px 0 32px;
            border-top:1px solid var(--border); color:var(--txt3); font-size:12px;
        }
        .footer a { color:var(--rose); text-decoration:none; }

        /* ── RESPONSIVE ── */
        @media(max-width:900px) {
            .nav-links { display:none; }
            .main { padding:76px 16px 40px; }
            .hero { padding:40px 28px; }
            .g2,.g3,.g4 { grid-template-columns:1fr; }
            .hero-metrics { gap:10px; }
            .hero-metric { min-width:auto; flex:1; padding:14px; }
            .prog-grid { grid-template-columns:1fr; }
        }
        .mobile-btn {
            display:none; background:none; border:none; color:var(--txt); font-size:20px; cursor:pointer;
        }
        @media(max-width:900px) {
            .mobile-btn { display:block; }
            .nav-links.open {
                display:flex; flex-direction:column; position:absolute;
                top:60px; left:0; right:0; background:#fff;
                padding:16px; border-bottom:1px solid var(--border);
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <div class="nav-brand"><span>GUNO</span> · MKT PLAN</div>
            <button class="mobile-btn" onclick="document.getElementById('navLinks').classList.toggle('open')">☰</button>
            <div class="nav-links" id="navLinks"></div>
            <div style="display:flex;gap:4px">
                <a href="tracker.html" class="nav-admin">📈 Tracker</a>
                <a href="admin.html" class="nav-admin">⚙ Admin</a>
            </div>
        </div>
    </nav>

    <main class="main" id="app"></main>

    <script>
    // Clean up legacy key only (v3 is current, keep it)
    localStorage.removeItem('guno_mkt_plan_v2');
    const D = getData();

    const sections = [
        { id:'overview', label:'Tổng quan' },
        { id:'campaign', label:'Chiến dịch Vị Nhà' },
        { id:'branding', label:'Branding' },
        { id:'channels', label:'Kênh bán' },
        { id:'campaigns', label:'Timeline' },
        { id:'programs', label:'Chương trình' },
        { id:'tasks', label:'Phân công' },
        { id:'budget', label:'Ngân sách' },
        { id:'costs', label:'Chi phí' },
        { id:'pnl', label:'P&L' },
        { id:'kpi', label:'KPIs' },
        { id:'evaluation', label:'Đánh giá' }
    ];

    // Build nav
    document.getElementById('navLinks').innerHTML = sections.map((s,i) =>
        `<button class="nav-link${i===0?' active':''}" data-s="${s.id}">${s.label}</button>`
    ).join('');

    // Nav click
    document.querySelectorAll('.nav-link').forEach(l => {
        l.addEventListener('click', () => {
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            l.classList.add('active');
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(l.dataset.s)?.classList.add('active');
            window.scrollTo({top:0,behavior:'smooth'});
            document.getElementById('navLinks').classList.remove('open');
        });
    });

    // Tab handler
    document.addEventListener('click', e => {
        if (e.target.classList.contains('tab')) {
            const parent = e.target.closest('.section') || e.target.closest('.card');
            parent.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            parent.querySelectorAll('.tab-c').forEach(tc => tc.classList.remove('active'));
            document.getElementById(e.target.dataset.tab)?.classList.add('active');
        }
        // Program toggle
        if (e.target.closest('.prog-head')) {
            e.target.closest('.prog').classList.toggle('open');
        }
        // Dept toggle
        if (e.target.closest('.dept-head')) {
            e.target.closest('.dept').classList.toggle('open');
        }
    });

    // ── RENDER ──
    const app = document.getElementById('app');
    app.innerHTML = `
    <!-- OVERVIEW -->
    <div class="section active" id="overview">
        <div class="hero">
            <div class="hero-eyebrow">${D.meta.month} · Live Plan</div>
            <h1>${D.meta.planTitle}<br><span class="accent">${D.meta.planSubtitle}</span></h1>
            <p class="hero-sub">Chiến dịch <strong style="color:var(--gold)">“${D.meta.campaignName}”</strong> — BST <strong>${D.meta.bstName}</strong> (${D.meta.bstCount} mẫu). Mục tiêu ${formatVND(D.targets.totalRevenue)}. Thông điệp: <strong style="color:var(--rose)">“${D.meta.tagline}”</strong></p>
            <div class="hero-metrics">
                <div class="hero-metric"><div class="hero-metric-val" style="color:var(--emerald)">${formatVND(D.targets.totalRevenue)}</div><div class="hero-metric-label">Doanh thu mục tiêu</div></div>
                <div class="hero-metric"><div class="hero-metric-val" style="color:var(--violet)">${formatNum(D.targets.totalOrders)}</div><div class="hero-metric-label">Đơn hàng cần đạt</div></div>
                <div class="hero-metric"><div class="hero-metric-val" style="color:var(--cyan)">${formatVND(D.targets.aov)}</div><div class="hero-metric-label">AOV trung bình</div></div>
                <div class="hero-metric"><div class="hero-metric-val" style="color:var(--rose)">~${formatVND(D.targets.totalBudget)}</div><div class="hero-metric-label">Budget Marketing</div></div>
            </div>
        </div>

        <div class="g3">
            ${D.channels.map(ch => `
                <div class="card ch-card" style="border-top:2px solid ${ch.color}">
                    <div style="display:flex;justify-content:space-between;align-items:center">
                        <span style="font-weight:700;font-size:14px">${ch.name}</span>
                        <span style="font-size:18px">${ch.icon}</span>
                    </div>
                    <div class="ch-val" style="color:${ch.color}">${formatVND(ch.revenue)}</div>
                    <div class="ch-sub">${ch.pct}% tổng DT · ~${formatNum(ch.orders)} đơn</div>
                    <div class="ch-bar"><div class="ch-bar-fill" style="width:${ch.pct}%;background:${ch.color}"></div></div>
                </div>
            `).join('')}
        </div>

        <div class="g4">
            <div class="card card-sm" style="border-left:2px solid var(--crimson)">

            }).join('')}
        </div>

        <div class="tbl-wrap">
            <div class="tbl-title">📋 Bảng KPI đầy đủ</div>
            <table>
                <thead><tr><th>#</th><th>Nhóm</th><th>KPI</th><th>Target</th><th>Đơn vị</th></tr></thead>
                <tbody>
                    ${D.kpis.map((k,i) => `<tr><td class="num">${i+1}</td><td>${k.category}</td><td style="font-weight:600;color:var(--txt)">${k.name}</td><td class="num" style="color:var(--rose)">${k.target}</td><td style="color:var(--txt3)">${k.unit}</td></tr>`).join('')}
                </tbody>
            </table>
        </div>

        <div class="tbl-wrap">
            <div class="tbl-title">⭐ Khung đánh giá</div>
            <table>
                <thead><tr><th>Mức</th><th>Tên</th><th>Doanh thu</th><th>ROAS</th><th>Action</th></tr></thead>
                <tbody>
                    <tr><td>⭐⭐⭐⭐⭐</td><td style="color:var(--emerald);font-weight:700">Xuất sắc</td><td class="num">≥ 55 tỷ</td><td class="num">≥ 7x</td><td>Scale → T6</td></tr>
                    <tr><td>⭐⭐⭐⭐</td><td style="color:var(--cyan);font-weight:700">Tốt</td><td class="num">45-54.9 tỷ</td><td class="num">5-7x</td><td>Maintain momentum</td></tr>
                    <tr><td>⭐⭐⭐</td><td style="color:var(--orange);font-weight:700">Đạt</td><td class="num">40-44.9 tỷ</td><td class="num">4-5x</td><td>Review & adjust</td></tr>
                    <tr><td>⭐⭐</td><td style="color:var(--crimson);font-weight:700">Cần cải thiện</td><td class="num">30-39.9 tỷ</td><td class="num">3-4x</td><td>Audit toàn diện</td></tr>
                    <tr><td>⭐</td><td style="color:var(--txt3);font-weight:700">Thất bại</td><td class="num">< 30 tỷ</td><td class="num">< 3x</td><td>Restructure</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ĐÁNH GIÁ -->
    <div class="section" id="evaluation">
        <div class="sec-head"><div class="sec-head-line"></div><h2>Đánh giá Chiến dịch "Vị Nhà"</h2><p>SWOT, hiệu quả, rủi ro, bài học HAPAS, và verdict tổng thể</p></div>

        <!-- SWOT -->
        ${D.evaluation.swot ? `
        <div class="g2" style="margin-bottom:20px">
            <div class="card" style="border-top:3px solid var(--emerald);padding:20px">
                <div style="font-weight:700;margin-bottom:10px;color:var(--emerald)">💪 Strengths</div>
                ${D.evaluation.swot.strengths.map(s => '<div style="font-size:12px;color:var(--txt2);padding:3px 0">✅ ' + s + '</div>').join('')}
            </div>
            <div class="card" style="border-top:3px solid var(--orange);padding:20px">
                <div style="font-weight:700;margin-bottom:10px;color:var(--orange)">⚡ Weaknesses</div>
                ${D.evaluation.swot.weaknesses.map(w => '<div style="font-size:12px;color:var(--txt2);padding:3px 0">⚠️ ' + w + '</div>').join('')}
            </div>
            <div class="card" style="border-top:3px solid var(--cyan);padding:20px">
                <div style="font-weight:700;margin-bottom:10px;color:var(--cyan)">🚀 Opportunities</div>
                ${D.evaluation.swot.opportunities.map(o => '<div style="font-size:12px;color:var(--txt2);padding:3px 0">💡 ' + o + '</div>').join('')}
            </div>
            <div class="card" style="border-top:3px solid var(--rose);padding:20px">
                <div style="font-weight:700;margin-bottom:10px;color:var(--rose)">🔥 Threats</div>
                ${D.evaluation.swot.threats.map(t => '<div style="font-size:12px;color:var(--txt2);padding:3px 0">❌ ' + t + '</div>').join('')}
            </div>
        </div>` : ''}

        <div class="tbl-wrap">
            <div class="tbl-title">📊 Đánh giá hiệu quả từng hạng mục</div>
            <table>
                <thead><tr><th>Hạng mục</th><th>Điểm</th><th>Nhận xét</th></tr></thead>
                <tbody>
                    ${D.evaluation.effectiveness.map(e => '<tr><td style="font-weight:700">' + e.aspect + '</td><td class="num">' + e.score + '</td><td style="color:var(--txt2);font-size:12px">' + e.note + '</td></tr>').join('')}
                </tbody>
            </table>
        </div>

        <div class="tbl-wrap">
            <div class="tbl-title">⚠️ Quản trị rủi ro</div>
            <table>
                <thead><tr><th>Rủi ro</th><th>Xác suất</th><th>Giải pháp</th></tr></thead>
                <tbody>
                    ${D.evaluation.risks.map(r => '<tr><td style="font-weight:700;color:var(--orange)">' + r.risk + '</td><td class="num">' + r.prob + '</td><td style="color:var(--txt2);font-size:12px">' + r.solution + '</td></tr>').join('')}
                </tbody>
            </table>
        </div>

        <!-- HAPAS Lessons -->
        ${D.evaluation.hapasLessons ? `
        <div class="card" style="margin:20px 0;padding:24px;border-left:4px solid var(--gold)">
            <div style="font-weight:700;margin-bottom:12px;font-size:14px">📖 Bài học từ HAPAS x Haidilao</div>
            ${D.evaluation.hapasLessons.map(l => '<div style="font-size:12px;color:var(--txt2);padding:4px 0;border-bottom:1px solid var(--border)">' + l + '</div>').join('')}
        </div>` : ''}

        <div class="card" style="padding:32px;border:1px solid rgba(212,175,55,0.2);background:linear-gradient(135deg,rgba(212,175,55,0.04),rgba(196,149,106,0.06))">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--rose);margin-bottom:12px">Verdict — Kết luận CMO</div>
            <div style="font-size:14px;color:var(--txt);line-height:1.8">${D.evaluation.verdict}</div>
        </div>
    </div>



    <div class="footer">
        <p><strong style="color:var(--rose)">GUNO</strong> · Chiến dịch "Vị Nhà" · ${D.meta.month}</p>
        <p style="margin-top:6px">BST ${D.meta.bstName} · Target ${formatVND(D.targets.totalRevenue)} · <a href="admin.html">⚙ Admin</a></p>
    </div>
    `;
    </script>
</body>
</html>
